# This is the configuration file for klipper software
# NOTE: The serial path below is just a placeholder
# Once the STM32 is flashed and connected to the Raspberry Pi via USB,
# you must SSH into the Pi and run the following command to find your unique MCU ID
# ls /dev/serial/by-id/*
# Then copy the output and replace the serial path below with your specific ID

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_000000000000-if00

[stepper_x]
step_pin: PC6
dir_pin: PC7
enable_pin: PC8
microsteps: 16
rotation_distance: 40
endstop_pin: PC9
position_endstop: 0
position_max: 400

[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: PA15
reg_resistor: 0.110

[stepper_y]
step_pin: PE10
dir_pin: PE11
enable_pin: PE12
microsteps: 16
rotation_distance: 40
endstop_pin: PE9
position_endstop: 0
position_max: 400

[tmc2209 stepper_y]
uart_pin: PE8
diag_pin: PE13
reg_resistor: 0.110

[stepper_z]
step_pin: PE15
dir_pin: PB10
enable_pin: PB11
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 400

[tmc2209 stepper_z]
uart_pin: PD11
diag_pin: PE14
reg_resistor: 0.110

[stepper_z1]
step_pin: PC1
dir_pin: PC2
enable_pin: PC3
microsteps: 16
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PD12
diag_pin: PE1
reg_resistor: 0.110

[stepper_z2]
step_pin: PD14
dir_pin: PD15
enable_pin: PD10
microsteps: 16
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: PD13
diag_pin: PE0
reg_resistor: 0.110

[extruder]
step_pin: PB0
dir_pin: PB1
enable_pin: PB2
microsteps: 16
rotation_distance: 7.71
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB3
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
control: pid
pid_kp: 22.2
pid_ki: 1.08
pid_kd: 114
min_temp: 0
max_temp: 300

[tmc2209 extruder]
uart_pin: PE7
diag_pin: PB4
reg_resistor: 0.110

[heater_bed]
heater_pin: PB8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2
control: pid
pid_kp: 54.027
pid_ki: 0.770
pid_kd: 948.182
min_temp: 0
max_temp: 130

[fan_generic fan1]
pin: PC4

[fan_generic fan2]
pin: PC5

[fan_generic fan3]
pin: PA3

[output_pin laser_pwm]
pin: PB9
pwm: True

[probe]
pin: PA0
z_offset: 0

[display]
lcd_type: st7789v
spi_bus: spi1
cs_pin: PE4
dc_pin: PE3
reset_pin: PE2

[beeper]
pin: PE5

[filament_switch_sensor fil_runout]
switch_pin: PE6
